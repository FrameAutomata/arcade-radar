name: Deploy Demo

on:
  workflow_dispatch:

jobs:
  deploy-demo:
    name: Deploy EAS demo alias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Deploy demo alias
        run: npx eas-cli@latest deploy --alias demo --non-interactive
        env:
          EAS_NO_VCS: 1
          EXPO_PUBLIC_AUTH_REDIRECT_URL: https://arcade-radar--demo.expo.app/
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
